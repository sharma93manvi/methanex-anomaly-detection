# When headless is set here (not via CLI), browser.serverAddress is not overridden by Streamlit.
[server]
headless = true

# Tell Streamlit which address/port to show in the browser when behind a reverse proxy.
[browser]
serverAddress = "gcp-team4.themanvisharma.com"
serverPort = 80

# Default to light theme
[theme]
base = "light"
