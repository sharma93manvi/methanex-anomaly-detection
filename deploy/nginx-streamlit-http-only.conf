# Temporary config: HTTP only, with ACME challenge location for obtaining Let's Encrypt cert.
# Use this first, run certbot, then deploy nginx-streamlit.conf (with HTTPS).
server {
    listen 80 default_server;
    server_name gcp-team4.themanvisharma.com 35.233.130.33;
    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_redirect http://127.0.0.1:8501/ http://$host/;
        proxy_redirect http://35.233.130.33:8501/ http://$host/;
        proxy_redirect http://35.233.130.33/ http://$host/;
        proxy_redirect ~^https?://[^/]+:8501/(.*)$ http://$host/$1;
        sub_filter_once off;
        sub_filter_types *;
        sub_filter '35.233.130.33:8501' 'gcp-team4.themanvisharma.com';
        sub_filter 'http://35.233.130.33:8501' 'http://gcp-team4.themanvisharma.com';
        sub_filter '35.233.130.33' 'gcp-team4.themanvisharma.com';
        sub_filter '<head>' '<head><script>(function(){var h="gcp-team4.themanvisharma.com";function r(u){if(typeof u!=="string")return u;if(u.indexOf("35.233.130.33")===-1)return u;return u.replace(/35\\.233\\.130\\.33(:\d+)?/g,h);}var oa=location.assign;location.assign=function(u){oa(r(u));};var or=location.replace;location.replace=function(u){or(r(u));};})();</script>';
    }

    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
