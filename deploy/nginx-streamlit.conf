# HTTPS (secure) - serve app for subdomain with Let's Encrypt certificate
server {
    listen 443 ssl default_server;
    server_name gcp-team4.themanvisharma.com;
    client_max_body_size 50M;

    ssl_certificate     /etc/letsencrypt/live/gcp-team4.themanvisharma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gcp-team4.themanvisharma.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_redirect http://127.0.0.1:8501/ https://$host/;
        proxy_redirect http://35.233.130.33:8501/ https://$host/;
        proxy_redirect http://35.233.130.33/ https://$host/;
        proxy_redirect ~^https?://[^/]+:8501/(.*)$ https://$host/$1;
        sub_filter_once off;
        sub_filter_types *;
        sub_filter '35.233.130.33:8501' 'gcp-team4.themanvisharma.com';
        sub_filter 'http://35.233.130.33:8501' 'https://gcp-team4.themanvisharma.com';
        sub_filter '35.233.130.33' 'gcp-team4.themanvisharma.com';
        sub_filter '<head>' '<head><script>(function(){var h="gcp-team4.themanvisharma.com";function r(u){if(typeof u!=="string")return u;if(u.indexOf("35.233.130.33")===-1)return u;return u.replace(/35\\.233\\.130\\.33(:\d+)?/g,h);}var oa=location.assign;location.assign=function(u){oa(r(u));};var or=location.replace;location.replace=function(u){or(r(u));};})();</script>';
    }

    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# HTTP: redirect subdomain to HTTPS; serve ACME challenge for certificate renewal
server {
    listen 80;
    server_name gcp-team4.themanvisharma.com;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

